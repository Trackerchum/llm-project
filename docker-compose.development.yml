# REMOVE PORTS FOR STAING/PRODUCTION
services:
  dependencies:
    image: node:22.0.0-alpine
    working_dir: /app
    restart: "no"
    command: >
      sh -c "set -eux; npm ci --workspaces --include-workspace-root"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules

  frontend:
    image: ulp-frontend
    build:
      context: .
      dockerfile: src/frontend/main-ui/Dockerfile.development
    working_dir: /app/src/frontend/main-ui
    command: sh -c "npm run start"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      - REACT_APP_SERVICES_HOST=/api
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      dependencies:
        condition: service_completed_successfully
      server:
        condition: service_started
      identity-server:
        condition: service_started
    networks:
      - frontend

  server:
    image: ulp-server
    build:
      context: .
      dockerfile: src/backend/server/Dockerfile.development
    working_dir: /app/src/backend/server
    command: sh -c "mkdir -p build && touch build/server.js && npm run start"
    ports:
      - "5001:5001"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      dependencies:
        condition: service_completed_successfully
      db-redis:
        condition: service_started
      db-mongo:
        condition: service_healthy
    networks:
      - server

  mcp-server:
    image: ulp-mcp-server
    build:
      context: .
      dockerfile: src/backend/mcp-server/Dockerfile.development
    working_dir: /app/src/backend/mcp-server
    command: sh -c "mkdir -p build && touch build/server.js && npm run start"
    ports:
      - "6001:6001"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      dependencies:
        condition: service_completed_successfully
      db-redis:
        condition: service_started
      db-mongo:
        condition: service_healthy
      llm-ollama-init:
        condition: service_completed_successfully
    networks:
      - server

  identity-server:
    image: ulp-identity-server
    build:
      context: .
      dockerfile: src/backend/identity-server/Dockerfile.development
    working_dir: /app/src/backend/identity-server
    command: sh -c "mkdir -p build && touch build/server.js && npm run start"
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      dependencies:
        condition: service_completed_successfully
      db-redis:
        condition: service_started
      db-mongo:
        condition: service_healthy
    networks:
      - server

  db-redis:
    image: ulp-redis
    build:
      context: ./src/db/redis
      dockerfile: Dockerfile.development
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - server

  db-mongo:
    image: ulp-mongo
    build:
      context: ./src/db/mongo
      dockerfile: Dockerfile.development
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=dev_root_password_change_me
      - MONGO_INITDB_DATABASE=llm_project
      - MONGO_APP_DB=llm_project
      - MONGO_APP_USERNAME=llm_project_app
      - MONGO_APP_PASSWORD=dev_app_password_change_me
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --host 127.0.0.1 --port 27017 -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)\"" ]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - server

  redis-insight:
    image: redislabs/redisinsight:3.0
    # run as root user so container can write to volume
    user: "0:0"
    ports:
      - "6479:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - db-redis
    networks:
      - server

  proxy-nginx:
    image: ulp-proxy-nginx
    build:
      context: ./src/proxy/nginx
      dockerfile: Dockerfile.development
    ports:
      - "80:80"
    depends_on:
      - frontend
      - server
      - mcp-server
      - identity-server
    networks:
      - frontend
      - server

  llm-ollama:
    image: ollama/ollama:0.16.1
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - server

  llm-ollama-init:
    image: ollama/ollama:0.16.1
    depends_on:
      - llm-ollama
    restart: "no"
    environment:
      OLLAMA_HOST: "http://llm-ollama:11434"
      OLLAMA_MODELS: "llama3.2:1b llama3.1:8b"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - server
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
        set -eux
        echo "INIT: OLLAMA_HOST=$$OLLAMA_HOST"
        ollama list || true
        for model in $$OLLAMA_MODELS; do
          ollama pull "$$model"
        done
        ollama list

networks:
  frontend:
  server:


volumes:
  root_node_modules:
  redis_data:
  mongo_data:
  redisinsight_data:
  ollama_data:
